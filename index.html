<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Glam Room - Tarjeta de Lealtad Digital</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="qr-page">
    <div class="display-card">
        <div class="hearts-decoration">💕</div>
        
        <header>
            <div class="logo-glam">The Glam Room</div>
            <h1>Tarjeta de Lealtad Digital</h1>
            <p class="subtitle">¡Escanea y comienza a ganar!</p>
        </header>

        <div class="qr-wrapper">
            <div class="qr-box">
                <div id="qrcode"></div>
                <div class="scan-animation"></div>
            </div>
            <p class="scan-hint">Apunta tu cámara aquí</p>
        </div>

        <div class="rewards-preview">
            <h3>Tus Recompensas</h3>
            <div class="reward-steps">
                <div class="step">
                    <span class="heart">🤍</span>
                    <span class="num">5</span>
                    <span class="label">10% OFF</span>
                </div>
                <div class="arrow">→</div>
                <div class="step">
                    <span class="heart">💖</span>
                    <span class="num">10</span>
                    <span class="label">15% OFF</span>
                </div>
            </div>
        </div>

        <div class="manual-url">
            <p>¿No funciona el QR?</p>
            <strong>theglamroom.mx/vip</strong>
        </div>

        <footer>
            <p>📍 Síguenos @theglamroom.mx</p>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const url = window.location.href.replace('index.html', 'cliente.html');
        new QRCode(document.getElementById("qrcode"), {
            text: url,
            width: 200,
            height: 200,
            colorDark: "#d63384",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
