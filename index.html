<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Glam Room - Tarjeta de Lealtad Digital</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="qr-page">
    <div class="display-card">
        <div class="hearts-decoration">💕</div>
        
        <header>
            <div class="logo-glam">The Glam Room</div>
            <h1>Tarjeta de Lealtad Digital</h1>
            <p class="subtitle">¡Escanea y comienza a ganar!</p>
        </header>

        <div class="qr-wrapper">
            <div class="qr-box">
                <div id="qrcode"></div>
                <div class="scan-animation"></div>
            </div>
            <p class="scan-hint">Apunta tu cámara aquí</p>
        </div>

        <!-- Instagram Preview -->
        <div class="instagram-preview">
            <h3>Síguenos en Instagram</h3>
            <a href="https://www.instagram.com/theglamroom.mx/" target="_blank" class="insta-link">
                <div class="insta-card">
                    <div class="insta-header">
                        <div class="insta-avatar">✨</div>
                        <div class="insta-info">
                            <span class="insta-name">@theglamroom.mx</span>
                            <span class="insta-followers">The Glam Room</span>
                        </div>
                    </div>
                    <div class="insta-bio">
                        💅 Uñas • Pestañas • Cejas<br>
                        📍 Tu ciudad<br>
                        ✨ Experiencia Glam
                    </div>
                    <div class="insta-button">
                        <span>📷 Ver perfil</span>
                    </div>
                </div>
            </a>
        </div>

        <footer>
            <p>📍 Síguenos @theglamroom.mx</p>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const url = 'https://ernestomure92-dev.github.io/the-glam-room-vip/cliente.html';
        
        console.log('QR URL:', url);
        
        new QRCode(document.getElementById("qrcode"), {
            text: url,
            width: 200,
            height: 200,
            colorDark: "#d63384",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
