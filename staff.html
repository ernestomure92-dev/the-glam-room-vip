<!DOCTYPE html>
<html lang="es">
<head>
    <!-- PROTECCIÓN POR CONTRASEÑA - STAFF ONLY -->
    <script>
        (function() {
            const STAFF_PASSWORD = 'glam2026#'; // Cambia esta contraseña
            const MAX_ATTEMPTS = 3;
            
            // Verificar si ya está autenticado en esta sesión
            if (sessionStorage.getItem('staffAuth') !== 'true') {
                let attempts = 0;
                let authenticated = false;
                
                while (attempts < MAX_ATTEMPTS && !authenticated) {
                    const input = prompt(
                        '🔒 Acceso Restringido - Staff Only\n\n' +
                        'Ingresa la contraseña:' +
                        (attempts > 0 ? `\n\n⚠️ Intento ${attempts} de ${MAX_ATTEMPTS}` : '')
                    );
                    
                    if (input === null) {
                        // Usuario canceló
                        window.location.href = 'index.html';
                        return;
                    }
                    
                    if (input === STAFF_PASSWORD) {
                        authenticated = true;
                        sessionStorage.setItem('staffAuth', 'true');
                        alert('✅ Acceso concedido');
                    } else {
                        attempts++;
                        if (attempts >= MAX_ATTEMPTS) {
                            alert('❌ Demasiados intentos fallidos');
                            window.location.href = 'index.html';
                            return;
                        }
                        alert('❌ Contraseña incorrecta');
                    }
                }
            }
        })();
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff - The Glam Room</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="staff-app">
    <div class="staff-container">
        <header class="staff-header">
            <div class="brand">The Glam Room</div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <span class="staff-badge">STAFF</span>
                <button onclick="logoutStaff()" class="btn-icon" title="Cerrar sesión">🔒</button>
            </div>
        </header>

        <!-- Paso 1: Validar -->
        <div id="step1" class="staff-step active">
            <h2>Registrar Visita</h2>
            
            <div class="method-selector">
                <button class="method-btn active" onclick="setMethod('code')">
                    <span>🔢</span>
                    Por Código
                </button>
                <button class="method-btn" onclick="setMethod('phone')">
                    <span>📱</span>
                    Por Número
                </button>
            </div>

            <!-- Validar por código -->
            <div id="method-code" class="method-panel active">
                <p class="panel-hint">Ingresa el código de 4 dígitos del cliente</p>
                <div class="code-inputs">
                    <input type="number" class="digit" maxlength="1" data-index="0">
                    <input type="number" class="digit" maxlength="1" data-index="1">
                    <input type="number" class="digit" maxlength="1" data-index="2">
                    <input type="number" class="digit" maxlength="1" data-index="3">
                </div>
                <button onclick="verifyCode()" class="btn-pink">Validar Código</button>
            </div>

            <!-- Validar por teléfono -->
            <div id="method-phone" class="method-panel">
                <p class="panel-hint">Ingresa el número del cliente</p>
                <div class="staff-phone-input">
                    <span class="country">+52</span>
                    <input type="tel" id="staffPhone" placeholder="55 1234 5678" maxlength="10">
                </div>
                <button onclick="searchPhone()" class="btn-pink">Buscar Cliente</button>
            </div>

            <!-- Resultado -->
            <div id="clientFound" class="client-result" style="display: none;">
                <div class="client-card-small">
                    <h3 id="foundName">Cliente</h3>
                    <p id="foundPhone">+52 55 0000 0000</p>
                    <div class="mini-hearts" id="miniHearts"></div>
                </div>
                
                <div class="action-buttons">
                    <button onclick="confirmStamp()" class="btn-pink btn-success">
                        ✓ Confirmar Sello
                    </button>
                    <button onclick="cancelSearch()" class="btn-text">Cancelar</button>
                </div>
            </div>
        </div>

        <!-- Paso 2: Éxito -->
        <div id="step2" class="staff-step">
            <div class="success-box">
                <div class="success-anim">💕</div>
                <h2>¡Sello Registrado!</h2>
                <p id="successMsg">Visita 3 de 10</p>
                
                <div id="newReward" class="new-reward" style="display: none;">
                    <span>🎉</span>
                    <p id="rewardText">¡Ganó 10% de descuento!</p>
                </div>
                
                <button onclick="nextClient()" class="btn-pink">Siguiente Cliente</button>
            </div>
        </div>

        <!-- Actividad reciente -->
        <div class="recent-activity">
            <h3>Actividad Reciente</h3>
            <div id="recentList" class="recent-list"></div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script src="js/firebase-config.js"></script>
    <script src="js/staff-app.js"></script>
    
    <script>
        function logoutStaff() {
            sessionStorage.removeItem('staffAuth');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
